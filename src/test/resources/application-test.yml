spring:
  datasource:
    url: jdbc:h2:mem:authorization_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  security:
    jwt-secret: test-secret-change-this-development-secret-32
  identity-service:
    base-url: http://localhost:8081
    user-validation-enabled: false
    service-token:

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
